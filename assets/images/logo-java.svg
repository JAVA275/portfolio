<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#ED8B00"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0095C8"/>
      <stop offset="100%" stop-color="#007396"/>
    </linearGradient>
    <linearGradient id="cupBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ED8B00"/>
      <stop offset="40%"  stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#C97700"/>
    </linearGradient>
    <filter id="dropshadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="steamGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="110" cy="110" r="106" fill="#0d0d10"/>
  <circle cx="110" cy="110" r="106" fill="none" stroke="#ED8B00" stroke-width="2.5" opacity="0.4"/>

  <!-- Steam wisps - Java Blue -->
  <path d="M82 88 C78 78, 86 68, 82 56 C78 44, 86 34, 82 24"
        fill="none" stroke="#007396" stroke-width="4"
        stroke-linecap="round" opacity="0.9" filter="url(#steamGlow)">
    <animate attributeName="d"
      values="M82 88 C78 78, 86 68, 82 56 C78 44, 86 34, 82 24;M82 88 C86 78, 78 68, 82 56 C86 44, 78 34, 82 24;M82 88 C78 78, 86 68, 82 56 C78 44, 86 34, 82 24"
      dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.4s" repeatCount="indefinite"/>
  </path>
  <path d="M110 84 C106 74, 114 64, 110 52 C106 40, 114 30, 110 18"
        fill="none" stroke="#007396" stroke-width="4"
        stroke-linecap="round" opacity="0.8" filter="url(#steamGlow)">
    <animate attributeName="d"
      values="M110 84 C106 74, 114 64, 110 52 C106 40, 114 30, 110 18;M110 84 C114 74, 106 64, 110 52 C114 40, 106 30, 110 18;M110 84 C106 74, 114 64, 110 52 C106 40, 114 30, 110 18"
      dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M138 88 C142 78, 134 68, 138 56 C142 44, 134 34, 138 24"
        fill="none" stroke="#007396" stroke-width="4"
        stroke-linecap="round" opacity="0.9" filter="url(#steamGlow)">
    <animate attributeName="d"
      values="M138 88 C142 78, 134 68, 138 56 C142 44, 134 34, 138 24;M138 88 C134 78, 142 68, 138 56 C134 44, 142 34, 138 24;M138 88 C142 78, 134 68, 138 56 C142 44, 134 34, 138 24"
      dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Cup body -->
  <path d="M72 92 L68 158 Q68 166 76 168 L144 168 Q152 168 152 158 L148 92 Z"
        fill="url(#cupBody)" filter="url(#dropshadow)"/>

  <!-- Rim top -->
  <ellipse cx="110" cy="92" rx="38" ry="8"   fill="#F5A623"/>
  <ellipse cx="110" cy="92" rx="36" ry="6.5" fill="#FFBB33"/>

  <!-- Coffee inside -->
  <ellipse cx="110" cy="92" rx="32" ry="5.5" fill="#3D1A00"/>
  <ellipse cx="103" cy="91" rx="12" ry="2.5" fill="#5C2A00" opacity="0.6"/>

  <!-- Highlight -->
  <path d="M76 100 Q74 130 76 155" stroke="rgba(255,255,255,0.2)"
        stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Saucer -->
  <ellipse cx="110" cy="168" rx="48" ry="9"   fill="#C97700"/>
  <ellipse cx="110" cy="165" rx="46" ry="7.5" fill="url(#orangeGrad)"/>
  <ellipse cx="110" cy="163" rx="40" ry="5"   fill="#F5A623" opacity="0.5"/>

  <!-- Handle -->
  <path d="M148 108 Q175 108 175 130 Q175 152 148 152"
        fill="none" stroke="url(#cupBody)" stroke-width="13" stroke-linecap="round"/>
  <path d="M148 108 Q170 109 170 130 Q170 151 148 152"
        fill="none" stroke="#A36200" stroke-width="5"
        stroke-linecap="round" opacity="0.4"/>

  <!-- Blue band with "java" -->
  <path d="M73 118 L147 118 L145 136 L75 136 Z" fill="url(#blueGrad)" opacity="0.92"/>
  <text x="110" y="132" text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-size="15" font-weight="900" fill="white" letter-spacing="2">java</text>

  <!-- JAVA label -->
  <text x="110" y="193" text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-size="24" font-weight="900" fill="#ED8B00" letter-spacing="4">JAVA</text>
  <!-- Subtitle -->
  <text x="110" y="208" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="8.5" fill="#007396" letter-spacing="3.5" font-weight="600">VAT-MARA SAMAKI</text>
</svg>
